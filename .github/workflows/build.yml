name: Build

on:
  schedule:
    - cron: '0 3 * * 0' # 03:00 UTC on Sundays
  workflow_dispatch: # Allows manual trigger

env:
  MIHOMO_VERSION: v1.19.21
  GO_VERSION: '1.25.x'

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push to the release branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup tools
        run: |
          wget -O mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-compatible-${MIHOMO_VERSION}.gz"
          gunzip -c mihomo.gz > mihomo-bin
          chmod +x mihomo-bin
          sudo mv mihomo-bin /usr/local/bin/mihomo

          go install github.com/v2fly/domain-list-community@latest
          go install github.com/v2fly/geoip@latest

      - name: Build Mihomo Rulesets
        run: |
          mkdir -p output_mrs

          if [ ! -d "mihomo/sources" ]; then
            echo "ERROR: Directory mihomo/sources does not exist."
            exit 1
          fi

          for dir in mihomo/sources/*/; do
            [ -d "$dir" ] || continue

            dirname=$(basename "$dir")
            echo "::group::Processing $dirname"

            clean_list=$(mktemp)
            ./scripts/download-and-merge.sh "$dir" "$clean_list"

            mihomo convert-ruleset domain text "$clean_list" "output_mrs/${dirname}.mrs"

            rm -f "$clean_list"
            echo "::endgroup::"
          done

      - name: Build Xray GeoIP
        run: |
          if [ ! -d "xray/geoip" ]; then
            echo "ERROR: Directory xray/geoip does not exist."
            exit 1
          fi

          echo "Building Xray GeoIP..."
          clean_list=$(mktemp)
          ./scripts/download-and-merge.sh "xray/geoip" "$clean_list"

          echo "Cleaned IP list (first 5 lines):"
          head -n 5 "$clean_list"

          # Generate config.json for v2fly/geoip tool
          cat > geoip_config.json <<EOF
          {
            "input": [{
              "type": "text",
              "action": "add",
              "args": {
                "name": "custom",
                "uri": "$clean_list"
              }
            }],
            "output": [{
              "type": "v2rayGeoIPDat",
              "action": "output",
              "args": {
                "outputDir": "./output_mrs",
                "outputName": "geoip.dat"
              }
            }]
          }
          EOF

          $(go env GOPATH)/bin/geoip -c geoip_config.json

          rm -f "$clean_list" geoip_config.json

      - name: Build Xray GeoSite
        run: |
          if [ ! -d "xray/geosite" ]; then
            echo "ERROR: Directory xray/geosite does not exist."
            exit 1
          fi

          echo "Building Xray GeoSite..."
          mkdir -p geosite_data
          geosite_list="geosite_data/custom"

          ./scripts/download-and-merge.sh "xray/geosite" "$geosite_list" --strip-dot-prefix

          $(go env GOPATH)/bin/domain-list-community --datapath=geosite_data --exportlists=custom --outputname=output_mrs/geosite.dat

          rm -rf geosite_data

      - name: Push to release branch
        working-directory: output_mrs
        run: |
          shopt -s nullglob
          files=(*.mrs *.dat)
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: No output files found!"
            exit 1
          fi

          git init
          git checkout --orphan release

          git add "${files[@]}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TIMESTAMP=$(date +%s)
          git commit -m "$TIMESTAMP"

          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" release
