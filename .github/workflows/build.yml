name: Build Mihomo Rulesets

on:
  schedule:
    - cron: '0 3 * * 0' # 03:00 UTC on Sundays
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push to the release branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: false

      - name: Setup tools
        run: |
          wget -O mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-compatible-v1.19.21.gz
          gunzip -c mihomo.gz > mihomo-bin
          chmod +x mihomo-bin
          sudo mv mihomo-bin /usr/local/bin/mihomo
          
          go install github.com/v2fly/domain-list-community@latest
          
          cd .github/scripts
          go mod init build_geoip
          go get github.com/golang/protobuf/proto
          go get github.com/v2fly/v2ray-core/v5/app/router/routercommon
          go mod tidy

      - name: Build Mihomo Rulesets
        run: |
          mkdir -p output_mrs
          
          # Iterate over directories in mihomo/sources
          if [ -d "mihomo/sources" ]; then
            for dir in mihomo/sources/*/; do
              # Ensure it's a directory
              [ -d "$dir" ] || continue
              
              dirname=$(basename "$dir")
              echo "Processing $dirname..."
              
              temp_list=$(mktemp)
              
              # Download lists
              if [ -f "${dir}lists-to-download.txt" ]; then
                while IFS= read -r url; do
                  # Skip empty lines
                  if [[ -z "$url" ]]; then
                    continue
                  fi
                  echo "Downloading $url"
                  curl -sSL "$url" >> "$temp_list"
                  echo "" >> "$temp_list" # Add newline just in case
                done < "${dir}lists-to-download.txt"
              fi
              
              # Add local additions
              if [ -f "${dir}addition.txt" ]; then
                cat "${dir}addition.txt" >> "$temp_list"
                echo "" >> "$temp_list"
              fi
              
              # Process: remove carriage returns, empty lines, and sort unique
              clean_list=$(mktemp)
              cat "$temp_list" | tr -d '\r' | awk 'NF' | sort -u > "$clean_list"
              
              echo "Building ruleset for $dirname..."
              mihomo convert-ruleset domain text "$clean_list" "output_mrs/${dirname}.mrs"
              
              rm "$temp_list" "$clean_list"
            done
          else
            echo "Directory mihomo/sources does not exist."
            exit 1
          fi

      - name: Build Xray GeoIP
        run: |
          if [ -d "xray/geoip" ]; then
            echo "Building Xray GeoIP..."
            temp_list=$(mktemp)
            
            if [ -f "xray/geoip/lists-to-download.txt" ]; then
              while IFS= read -r url; do
                if [[ -z "$url" ]]; then continue; fi
                echo "Downloading $url"
                curl -sSL "$url" >> "$temp_list"
                echo "" >> "$temp_list"
              done < "xray/geoip/lists-to-download.txt"
            fi
            
            if [ -f "xray/geoip/addition.txt" ]; then
              cat "xray/geoip/addition.txt" >> "$temp_list"
              echo "" >> "$temp_list"
            fi
            
            clean_list=$(mktemp)
            cat "$temp_list" | tr -d '\r' | awk 'NF' | sort -u > "$clean_list"
            
            cd .github/scripts
            go run build_xray_geoip.go -i "$clean_list" -o "../../output_mrs/geoip.dat"
            
            rm "$temp_list" "$clean_list"
          fi

      - name: Build Xray GeoSite
        run: |
          if [ -d "xray/geosite" ]; then
            echo "Building Xray GeoSite..."
            mkdir -p geosite_data
            temp_list="geosite_data/custom"
            touch "$temp_list"
            
            if [ -f "xray/geosite/lists-to-download.txt" ]; then
              while IFS= read -r url; do
                if [[ -z "$url" ]]; then continue; fi
                echo "Downloading $url"
                curl -sSL "$url" >> "$temp_list"
                echo "" >> "$temp_list"
              done < "xray/geosite/lists-to-download.txt"
            fi
            
            if [ -f "xray/geosite/addition.txt" ]; then
              cat "xray/geosite/addition.txt" >> "$temp_list"
              echo "" >> "$temp_list"
            fi
            
            # Clean up domains: remove leading '+.' and '.'
            sed -i 's/^+\.//g' "$temp_list"
            sed -i 's/^\.//g' "$temp_list"
            
            # Remove empty lines, carriage returns, sort unique
            clean_list=$(mktemp)
            cat "$temp_list" | tr -d '\r' | awk 'NF' | sort -u > "$clean_list"
            mv "$clean_list" "$temp_list"
            
            $(go env GOPATH)/bin/domain-list-community --datapath=geosite_data --exportlists=custom --outputname=output_mrs/geosite.dat
            
            rm -rf geosite_data
          fi

      - name: Push to release branch
        run: |
          cd output_mrs
          git init
          git checkout --orphan release
          
          # Add only the built .mrs files and .dat files
          git add *.mrs *.dat || true
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use Unix timestamp as commit message
          TIMESTAMP=$(date +%s)
          git commit -m "$TIMESTAMP"
          
          # Force push to release branch to overwrite history and save space
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git release
